<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chatbot</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#202123;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:800px;
    height:90vh;
    background:#343541;
    display:flex;
    flex-direction:column;
    border-radius:10px;
    overflow:hidden;
}

.header{
    background:#444654;
    padding:15px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
}

.chat-box{
    flex:1;
    overflow-y:auto;
    padding:20px;
}

.message{
    margin-bottom:15px;
    display:flex;
}

.user{
    justify-content:flex-end;
}

.bot{
    justify-content:flex-start;
}

.bubble{
    max-width:70%;
    padding:12px;
    border-radius:10px;
    line-height:1.5;
}

.user .bubble{
    background:#19c37d;
    color:white;
}

.bot .bubble{
    background:#444654;
    border:1px solid #555;
}

.input-area{
    display:flex;
    padding:15px;
    background:#40414f;
}

textarea{
    flex:1;
    resize:none;
    border:none;
    outline:none;
    border-radius:8px;
    padding:12px;
    font-size:16px;
}

button{
    margin-left:10px;
    width:100px;
    border:none;
    border-radius:8px;
    background:#19c37d;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#14a66b;
}
</style>

</head>
<body>

<div class="container">

    <div class="header">
        Gemini AI Chatbot
    </div>

    <div id="chatBox" class="chat-box">

        <div class="message bot">
            <div class="bubble">
                Hello 👋<br>
                Ask me anything.
            </div>
        </div>

    </div>

    <div class="input-area">

        <textarea
            id="prompt"
            rows="2"
            placeholder="Type your message..."></textarea>

        <button onclick="sendMessage()">Send</button>

    </div>

</div>

<script>

async function sendMessage(){

    const input=document.getElementById("prompt");
    const chat=document.getElementById("chatBox");

    const prompt=input.value.trim();

    if(prompt==="") return;

    // Show user message
    chat.innerHTML+=`
    <div class="message user">
        <div class="bubble">${prompt}</div>
    </div>`;

    input.value="";

    chat.scrollTop=chat.scrollHeight;

    try{

        const response=await fetch("http://127.0.0.1:8000/chat",{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                prompt:prompt
            })
        });

        const data=await response.json();

        chat.innerHTML+=`
        <div class="message bot">
            <div class="bubble">${data.reply}</div>
        </div>`;

    }
    catch(err){

        chat.innerHTML+=`
        <div class="message bot">
            <div class="bubble">
                Unable to connect to the server.
            </div>
        </div>`;

    }

    chat.scrollTop=chat.scrollHeight;

}

document.getElementById("prompt").addEventListener("keypress",function(e){

    if(e.key==="Enter" && !e.shiftKey){
        e.preventDefault();
        sendMessage();
    }

});

</script>

</body>
</html>
